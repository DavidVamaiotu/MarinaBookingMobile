<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>API toast preview</title>
  <link rel="stylesheet" href="../../styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="toolbar"><div class="brand"><div><strong>Parkline Calendar</strong><span>Previzualizare locală</span></div></div></section>
    <section class="timeline-panel"><header class="timeline-header"><div><p>Calendar</p><h1>Acțiuni API</h1></div></header></section>
  </main>
  <div class="overlay-layer">
    <div class="toast-region" id="toast" role="status" aria-live="polite" aria-atomic="false">
      <div class="toast-item pending" role="status"><span class="toast-icon" aria-hidden="true">⚙</span><span class="toast-message">Se salvează modificările…</span></div>
      <div class="toast-item success" role="status"><span class="toast-icon" aria-hidden="true">✓</span><span class="toast-message">Rezervarea a fost creată.</span></div>
      <div class="toast-item error" role="alert"><span class="toast-icon" aria-hidden="true">×</span><span class="toast-message">Conexiunea API nu a putut fi realizată.</span></div>
    </div>
  </div>
</body>
</html>
