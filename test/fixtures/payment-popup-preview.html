<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Avans popup preview</title>
  <link rel="stylesheet" href="../../styles.css">
  <style>
    body{display:grid;place-items:center;background:#eef1ed}
    .preview-calendar{position:fixed;inset:18px;display:grid;grid-template-columns:160px repeat(14,1fr);grid-auto-rows:42px;overflow:hidden;border:1px solid #ccd5cf;border-radius:15px;background:repeating-linear-gradient(90deg,#fff 0,#fff 52px,#e7ece8 53px);box-shadow:0 18px 50px rgba(46,56,51,.14)}
    .preview-calendar span{border-right:1px solid #e2e8e4;border-bottom:1px solid #e2e8e4}.preview-calendar b{margin:8px;border-radius:4px;background:#79ac65}
  </style>
</head>
<body>
  <div class="preview-calendar" aria-hidden="true"><span></span><b></b><span></span><b></b><span></span><b></b><span></span><b></b><span></span><b></b><span></span><b></b><span></span><b></b><span></span><b></b><span></span><b></b><span></span><b></b><span></span><b></b><span></span><b></b><span></span><b></b><span></span><b></b><span></span><b></b></div>
  <dialog id="paymentDialog" aria-labelledby="paymentDialogTitle">
    <form id="paymentForm" class="panel-form" method="dialog">
      <header><div><p>Plată rezervare</p><h2 id="paymentDialogTitle">Avans — Monica Rizea</h2></div><button class="icon" type="submit" aria-label="Închide">×</button></header>
      <section class="payment-section">
        <div class="payment-status-summary"><span class="payment-badge payment-badge-paid"><span class="payment-badge-icon">✓</span><span>Avans</span></span><span class="payment-badge payment-badge-balance"><span class="payment-badge-icon">▤</span><span>Rest de plată: <strong>1.340 lei</strong></span></span></div>
        <div class="payment-facts">
          <div class="payment-fact payment-fact-total"><span class="payment-fact-icon">▤</span><span><strong>Cost total</strong><b>1.890 lei</b></span></div>
          <div class="payment-fact payment-fact-paid"><span class="payment-fact-icon">✓</span><span><strong>Avans</strong><b>550 lei</b></span></div>
          <div class="payment-fact payment-fact-balance"><span class="payment-fact-icon">▭</span><span><strong>Rest de plată</strong><b>1.340 lei</b></span></div>
        </div>
        <div class="payment-verification"><div class="payment-note-card"><span class="payment-verification-icon">i</span><span><strong>Notă WordPress</strong><pre>Cost total: 1890 RON, Depozit: 550 RON, Rest: 1340 RON</pre></span></div><div class="payment-database-card"><span class="payment-verification-icon">≡</span><span><strong>Avans în baza de date WordPress</strong><b>550 lei</b></span></div></div>
        <div class="field-grid payment-controls"><label>Avans nou<input type="number" value="550"></label><button class="secondary" type="button"><span>▣</span>Salvează avansul</button></div>
        <button class="primary" id="sendPaymentRequest" type="button"><span>✉</span>Trimite emailul de plată</button>
      </section>
    </form>
  </dialog>
  <script>paymentDialog.showModal();</script>
</body>
</html>
