name: Release desktop

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    if: github.repository == 'DavidVamaiotu/MarinaBookingDesktop'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node scripts/verify-release-version.js
      - run: npm run check
      - run: npm test
      - run: npm run dist
      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" dist-electron/MarinaBookingDesktop-Setup-*.exe dist-electron/MarinaBookingDesktop-Setup-*.exe.blockmap dist-electron/latest.yml --title "Marina Booking Desktop $GITHUB_REF_NAME" --generate-notes
